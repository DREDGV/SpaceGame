<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Economy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="hud">
                <div class="hud-item">
                    <span>🚀 Статус:</span>
                    <span id="statusDisplay">В полёте</span>
                </div>
                <div class="hud-item">
                    <span>⛽ Топливо:</span>
                    <span id="fuelDisplay">200</span>
                </div>
                <div class="hud-item">
                    <span>💰 Кредиты:</span>
                    <span id="creditsDisplay">500</span>
                </div>
                <div class="hud-item">
                    <span>📦 Груз:</span>
                    <span id="cargoDisplay">Пусто</span>
                </div>
            </div>
            <div id="controls">
                <div class="control-hint">
                    <kbd>W</kbd> / <kbd>↑</kbd> - Двигатель
                </div>
                <div class="control-hint">
                    <kbd>A</kbd> / <kbd>←</kbd> - Поворот влево
                </div>
                <div class="control-hint">
                    <kbd>D</kbd> / <kbd>→</kbd> - Поворот вправо
                </div>
                <div class="control-hint">
                    <kbd>E</kbd> - Взаимодействие с планетой
                </div>
                <div class="control-hint">
                    <kbd>ESC</kbd> - Пауза
                </div>
            </div>
        </div>
        <div id="pauseScreen" class="hidden">
            <h2>⏸ ПАУЗА</h2>
            <p>Нажмите ESC для продолжения</p>
        </div>
        <div id="planetInteraction" class="hidden">
            <h2 id="planetName">Планета</h2>
            <div id="planetResources"></div>
            <div id="tradeButtons">
                <button id="buyButton" class="trade-btn">Купить</button>
                <button id="sellButton" class="trade-btn">Продать</button>
                <button id="closeButton" class="trade-btn">Закрыть</button>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/rocket.js"></script>
    <script src="js/planet.js"></script>
    <script src="js/star.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
