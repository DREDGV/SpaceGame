<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceGame — v0.1.14</title>
    <link rel="stylesheet" href="prototype/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="game-header">
        <div class="header-top">
          <div class="header-title-block">
            <h1 id="game-title">🌌 SpaceGame</h1>
            <span id="version-badge" class="version-badge">v0.1.14</span>
          </div>
          <section id="energy-panel" class="panel panel-energy panel-compact"></section>
          <div class="header-actions">
            <button id="changelog-btn" class="header-changelog-btn" type="button" title="История изменений">📋 v0.1.14</button>
            <div class="save-status-wrap">
              <button id="save-status" class="save-status" type="button" title="Нажмите для смены интервала автосохранения">Новая игра</button>
              <div id="save-interval-popup" class="save-interval-popup" hidden>
                <label class="save-interval-label">Каждые
                  <input id="save-interval-input" class="save-interval-input" type="number" min="5" max="300" step="5" value="15" />
                  сек
                </label>
              </div>
            </div>
            <button id="restart-onboarding-btn" class="header-service-btn" type="button" title="Начать обучение заново">📖</button>
            <button id="reset-progress-btn" class="header-reset-btn" type="button">Новая игра</button>
          </div>
        </div>
      </header>

      <!-- Onboarding intro (first launch) -->
      <div id="onboarding-intro-panel" class="panel panel-onboarding-intro" style="display:none"></div>

      <!-- Onboarding step-by-step -->
      <div id="onboarding-step-panel" class="panel panel-onboarding-step" style="display:none"></div>

      <div id="game-layout">
        <!-- Left sidebar: always-visible info -->
        <aside id="game-sidebar">
          <section id="resources-panel" class="panel"></section>
          <div id="era-progress-panel" class="panel panel-era-progress"></div>
        </aside>

        <!-- Main content: actions -->
        <main id="game-main">

          <div class="panel-row">
            <section id="gather-panel" class="panel"></section>
            <section id="craft-panel" class="panel"></section>
          </div>

          <div class="panel-row">
            <section id="buildings-panel" class="panel"></section>
            <section id="automation-panel" class="panel"></section>
          </div>

          <section id="research-panel" class="panel"></section>

          <section id="log-panel" class="panel"></section>
        </main>
      </div>
    </div>

    <!-- Changelog modal -->
    <div id="changelog-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="changelog-modal-title">
      <div class="modal-panel">
        <div class="modal-header">
          <h2 id="changelog-modal-title">📋 Журнал изменений</h2>
          <button id="changelog-close-btn" class="modal-close-btn" type="button" aria-label="Закрыть">✕</button>
        </div>
        <div id="changelog-content" class="modal-body"></div>
      </div>
    </div>

    <!-- Data & Logic -->
    <script src="prototype/data/game-data.js"></script>
    <script src="prototype/game-state.js"></script>
    <script src="prototype/ui.js"></script>
    <script src="prototype/app.js"></script>
  </body>
</html>
