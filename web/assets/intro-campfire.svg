<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520">
  <!-- Night sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="60%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="fire-glow" cx="50%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#e8620a" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#c04a05" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d1525" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8c0a0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8c0a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="520" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#e8e0c8" opacity="0.6">
    <circle cx="120" cy="40" r="1.2"/><circle cx="240" cy="25" r="0.9"/>
    <circle cx="380" cy="55" r="1.0"/><circle cx="500" cy="18" r="1.4"/>
    <circle cx="650" cy="38" r="0.8"/><circle cx="780" cy="22" r="1.1"/>
    <circle cx="920" cy="48" r="0.9"/><circle cx="1050" cy="30" r="1.3"/>
    <circle cx="1160" cy="55" r="0.8"/><circle cx="190" cy="80" r="0.7"/>
    <circle cx="330" cy="92" r="1.0"/><circle cx="460" cy="70" r="0.8"/>
    <circle cx="600" cy="85" r="1.2"/><circle cx="740" cy="65" r="0.9"/>
    <circle cx="870" cy="78" r="1.1"/><circle cx="1000" cy="60" r="0.7"/>
    <circle cx="1120" cy="88" r="1.0"/><circle cx="60" cy="110" r="0.8"/>
    <circle cx="1220" cy="70" r="0.9"/>
  </g>

  <!-- Moon -->
  <circle cx="960" cy="75" r="38" fill="url(#moon-glow)" opacity="0.4"/>
  <circle cx="960" cy="75" r="26" fill="#c8c0a0" opacity="0.85"/>
  <circle cx="972" cy="68" r="20" fill="#0d1525" opacity="0.7"/>

  <!-- Distant treeline (dark silhouette) -->
  <g fill="#060c0e" opacity="0.95">
    <polygon points="0,300 30,220 60,300"/>
    <polygon points="40,300 75,195 110,300"/>
    <polygon points="90,300 130,175 170,300"/>
    <polygon points="150,300 185,205 220,300"/>
    <polygon points="200,300 245,185 290,300"/>
    <polygon points="260,300 300,200 340,300"/>
    <polygon points="310,300 355,178 400,300"/>
    <polygon points="370,300 410,192 450,300"/>
    <polygon points="430,300 470,168 510,300"/>
    <polygon points="490,300 535,185 580,300"/>
    <polygon points="550,300 595,175 640,300"/>
    <polygon points="615,300 650,195 685,300"/>
    <polygon points="670,300 715,172 760,300"/>
    <polygon points="740,300 780,190 820,300"/>
    <polygon points="800,300 845,178 890,300"/>
    <polygon points="865,300 905,195 945,300"/>
    <polygon points="920,300 965,180 1010,300"/>
    <polygon points="985,300 1025,192 1065,300"/>
    <polygon points="1045,300 1090,175 1135,300"/>
    <polygon points="1110,300 1150,188 1190,300"/>
    <polygon points="1165,300 1210,172 1255,300"/>
    <polygon points="1220,300 1260,195 1280,300"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="300" width="1280" height="220" fill="#110e08"/>

  <!-- Fire glow on ground -->
  <ellipse cx="640" cy="390" rx="220" ry="80" fill="url(#fire-glow)"/>

  <!-- Rocks around fire -->
  <g fill="#2a200e">
    <ellipse cx="580" cy="400" rx="22" ry="10"/>
    <ellipse cx="700" cy="402" rx="20" ry="9"/>
    <ellipse cx="625" cy="415" rx="15" ry="7"/>
    <ellipse cx="658" cy="413" rx="16" ry="7"/>
  </g>

  <!-- Fire flames -->
  <g opacity="0.95">
    <polygon points="635,360 618,410 652,410" fill="#e8620a"/>
    <polygon points="640,345 622,408 658,408" fill="#f57d1a"/>
    <polygon points="645,355 628,410 660,410" fill="#e8520a"/>
    <polygon points="637,338 615,412 655,412" fill="#f09030"/>
    <polygon points="643,350 626,408 660,408" fill="#fba040"/>
    <polygon points="638,330 620,410 655,410" fill="#f5b045" opacity="0.7"/>
  </g>

  <!-- Silhouette figures around fire -->
  <!-- Figure 1: left, sitting -->
  <g fill="#0a0804">
    <ellipse cx="500" cy="392" rx="22" ry="10"/><!-- body -->
    <circle cx="500" cy="372" r="12"/><!-- head -->
    <rect x="488" y="382" width="25" height="12" rx="4"/>
  </g>
  <!-- Figure 2: center-left -->
  <g fill="#0d0b06">
    <circle cx="590" cy="368" r="13"/>
    <ellipse cx="590" cy="388" rx="18" ry="12"/>
  </g>
  <!-- Figure 3: right of fire, seated -->
  <g fill="#0a0804">
    <circle cx="730" cy="374" r="14"/>
    <ellipse cx="730" cy="394" rx="20" ry="12"/>
  </g>
  <!-- Figure 4: standing at shelter -->
  <g fill="#0d0b06">
    <circle cx="840" cy="345" r="12"/>
    <rect x="830" y="357" width="20" height="35" rx="4"/>
  </g>

  <!-- Primitive shelter (A-frame) -->
  <g stroke="#2a1a08" stroke-width="3" fill="none" opacity="0.85">
    <line x1="800" y1="420" x2="870" y2="310"/>
    <line x1="900" y1="420" x2="870" y2="310"/>
    <line x1="870" y1="310" x2="930" y2="380"/>
    <line x1="800" y1="420" x2="930" y2="380"/>
  </g>
  <polygon points="805,420 870,312 928,382 900,420" fill="#1a1005" opacity="0.7"/>

  <!-- Sparks -->
  <g fill="#fbbf24" opacity="0.8">
    <circle cx="632" cy="332" r="2.5"/>
    <circle cx="645" cy="318" r="1.8"/>
    <circle cx="620" cy="320" r="2.0"/>
    <circle cx="655" cy="308" r="1.5"/>
    <circle cx="638" cy="300" r="1.2"/>
    <circle cx="625" cy="295" r="1.0"/>
  </g>

  <!-- River reflection in background -->
  <path d="M 350 295 Q 500 290 640 296 Q 780 302 920 295" stroke="#1a2a3a" stroke-width="8" fill="none" opacity="0.4"/>
</svg>
